<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/lesson.js"></script>
    <title>TODO</title>
  </head>
  <body>
    <main>
      <h1>TODOアプリ</h1>
      <section>
        <h2>新規作成</h2>
        <div class="new-todo">
          <div>
            <label for="new-todo-name">TODO名</label>
            <input type="text" id="new-todo-name" placeholder="TODOを入力してください"/>
          </div>
          <div>
            <label for="new-person">担当者</label>
            <input type="text" id="new-person" placeholder="担当者を入力" />
          </div>
          <div>
            <label for="deadline">期限</label>
            <input type="date" id="deadline" placeholder="期限を入力" />
          </div>
          <div>
            <button type="button" id="register">送信</button>
          </div>
        </div>
      </section>
      <section>
        <h2>TODO一覧</h2>
        <table class="todo-list">
          <div class="filter">
            <label for="filter"></label><input type="text" id="filter" placeholder="絞り込み">
          </div>
          <thead>
            <tr>
              <th>TODO名</th>
              <th>担当者</th>
              <th>期限</th>
              <th>削除</th>
            </tr>
          </thead>
          <tbody id="todo-data">
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
